      - "src/app/(dashboard)/integrations/accounting/tax-mapping/page.jsx"
  components:
    new:
      - "src/components/integrations/SyncStatusCard.jsx"
      - "src/components/integrations/ReconciliationTable.jsx"
      - "src/components/integrations/TaxMappingEditor.jsx"
      - "src/components/integrations/ProviderSelector.jsx"
  api_routes:
    new:
      - "src/app/api/integrations/accounting/sync-status/route.js"
      - "src/app/api/integrations/accounting/retry/route.js"
      - "src/app/api/integrations/accounting/reconciliation/route.js"
      - "src/app/api/integrations/accounting/tax-mapping/route.js"
      - "src/app/api/integrations/peak/connect/route.js"
      - "src/app/api/integrations/sage/connect/route.js"
      - "src/app/api/integrations/sage/callback/route.js"
      - "src/app/api/workers/accounting-sync/route.js"
      - "src/app/api/workers/accounting-reconciliation/route.js"

