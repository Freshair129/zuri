task_id: T4_route-exports
feature: FEAT-006
concern: "Next.js App Router POST export wired via withAuth"
composer_slot: exports
depends_on: [T3_handler-body]

output:
  file: "gks/phase3.5_microtasks/FEAT-006/_outputs/T4.out.js"
  exports:
    - name: POST
      kind: const

prompt:
  template: |
    TASK: Write exactly one line of JavaScript that exports a named constant `POST`.

    It must be:
    export const POST = withAuth(mergeHandler)

    AVAILABLE (already in scope — do not re-import):
    - withAuth — from '@/lib/auth'
    - mergeHandler — from handler body

    CONSTRAINTS:
    - Exactly ONE line (the export statement)
    - Do NOT add `export default`
    - Do NOT wrap in try/catch
    - Do NOT add comments

    OUTPUT ONLY the one line. No markdown fences. No prose.
  inputs: {}

acceptance_tests:
  - type: contains
    rule: "export const POST = withAuth(mergeHandler)"
  - type: not_contains
    rule: "export default"

runner:
  model: "qwen2.5-coder:14b-instruct-q4_K_M"
  max_retries: 3
  temperature: 0.0
  num_ctx: 4096
