task_id: T1_validate-input
feature: FEAT-006
concern: "Validate request body shape for POST /api/pos/tables/merge"
composer_slot: helpers

output:
  file: "gks/phase3.5_microtasks/FEAT-006/_outputs/T1.out.js"
  exports:
    - name: validateMergeInput
      kind: function

prompt:
  template: |
    TASK: Write exactly one JavaScript function `validateMergeInput(body)`.

    INPUT: Anything (untrusted request body).
    OUTPUT: object { ok: boolean, error?: string, data?: { primary_id: string, children_ids: string[] } }

    RULES (check in order, stop at first failure):
    1. body must be a non-null object -> else return { ok: false, error: "Body must be a JSON object" }
    2. body.primary_id must be a non-empty string -> else return { ok: false, error: "primary_id required" }
    3. body.children_ids must be an array -> else return { ok: false, error: "children_ids must be an array" }
    4. body.children_ids must have length >= 1 -> else return { ok: false, error: "children_ids cannot be empty" }
    5. every element of body.children_ids must be a non-empty string -> else return { ok: false, error: "children_ids must all be non-empty strings" }
    6. otherwise return { ok: true, data: { primary_id: body.primary_id, children_ids: body.children_ids } }

    CONSTRAINTS:
    - Pure function, no imports, no I/O, no logging, no regex
    - Use `export function`
    - Do not use any external libraries (no Joi, no Zod, no yup)
    - No type annotations, no TypeScript

    OUTPUT ONLY the function. No markdown fences. No prose. Start directly with `export function`.
  inputs: {}

acceptance_tests:
  - input: 'null'
    expect: '{ "ok": false, "error": "Body must be a JSON object" }'
  - input: '{ "primary_id": "t1", "children_ids": ["t2","t3"] }'
    expect: '{ "ok": true, "data": { "primary_id": "t1", "children_ids": ["t2","t3"] } }'
  - input: '{ "primary_id": "", "children_ids": ["t2"] }'
    expect: '{ "ok": false, "error": "primary_id required" }'
  - input: '{ "primary_id": "t1", "children_ids": "not-array" }'
    expect: '{ "ok": false, "error": "children_ids must be an array" }'
  - input: '{ "primary_id": "t1", "children_ids": [] }'
    expect: '{ "ok": false, "error": "children_ids cannot be empty" }'
  - input: '{ "primary_id": "t1", "children_ids": ["t2",""] }'
    expect: '{ "ok": false, "error": "children_ids must all be non-empty strings" }'

runner:
  model: "qwen2.5-coder:14b-instruct-q4_K_M"
  max_retries: 3
  temperature: 0.0
  num_ctx: 4096
